<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Validaciones — Observatorio</title>
  <link rel="stylesheet" href="/css/estilos.css" />
  <link rel="stylesheet" href="/css/portal.css" />
</head>
<body>
  <div class="portal-layout">
    <aside class="portal-sidebar"></aside>
    <main class="portal-main">
      <h1>Validación de cargues</h1>
      <p class="subtitulo">Cargues en estado validado (listos para aprobar o rechazar).</p>
      <table class="tabla-portal">
        <thead><tr><th>ID</th><th>Archivo</th><th>Dependencia</th><th>Estado</th><th>Errores</th><th>Acciones</th></tr></thead>
        <tbody id="tb-cargas"></tbody>
      </table>
    </main>
  </div>
  <script type="module">
    import { initPortal, cargarTabla, fetchJson, apiUrl, puedeValidar } from "/js/portal/layout.js";
    if (!(await initPortal("/validaciones.html"))) throw 0;
    if (!puedeValidar()) { document.querySelector(".portal-main").innerHTML = "<p>Sin permiso.</p>"; throw 0; }

    await cargarTabla("/api/cargas", (c) => {
      const ok = c.estado === "VALIDADO_EXITOSO" || c.estado === "VALIDADO_OK";
      if (!ok) return "";
      return `<tr>
        <td>${c.id}</td><td>${c.archivo}</td><td>${c.dependencia}</td><td>${c.estado}</td><td>${c.total_errores}</td>
        <td>
          <button type="button" data-ap="${c.id}">Aprobar</button>
          <button type="button" data-rj="${c.id}">Rechazar</button>
        </td></tr>`;
    }, "tb-cargas", "No hay cargues pendientes de aprobación");

    document.getElementById("tb-cargas").addEventListener("click", async (ev) => {
      const ap = ev.target.closest("[data-ap]");
      const rj = ev.target.closest("[data-rj]");
      const id = ap?.dataset.ap || rj?.dataset.rj;
      if (!id) return;
      const path = ap ? `/api/cargas/${id}/aprobar` : `/api/cargas/${id}/rechazar`;
      const body = rj ? { observaciones: prompt("Motivo rechazo:") || "" } : {};
      const { res } = await fetchJson(apiUrl(path), { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      if (res.ok) location.reload();
      else alert("Error al actualizar");
    });
  </script>
</body>
</html>
