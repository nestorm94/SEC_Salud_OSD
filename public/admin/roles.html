<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roles — Administración</title>
  <link rel="stylesheet" href="/css/estilos.css" />
  <link rel="stylesheet" href="/css/portal.css" />
</head>
<body>
  <div class="portal-layout">
    <aside class="portal-sidebar"></aside>
    <main class="portal-main">
      <h1>Roles del sistema</h1>
      <div class="tabla-wrap">
        <table class="tabla-portal"><thead><tr><th>ID</th><th>Nombre</th><th>Descripción</th></tr></thead><tbody id="tb"></tbody></table>
      </div>
    </main>
  </div>
  <script type="module">
    import { initPortal, cargarTabla } from "/js/portal/layout.js";
    if (!(await initPortal("/admin/roles.html", { requiereAdmin: true }))) throw 0;
    await cargarTabla("/api/admin/roles", (r) =>
      `<tr><td>${r.id}</td><td>${r.nombre}</td><td>${r.descripcion || ""}</td></tr>`, "tb");
  </script>
</body>
</html>
