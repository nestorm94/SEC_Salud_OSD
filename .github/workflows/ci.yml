name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore, test and build API
        run: |
          dotnet restore backend/Observatorios.Api.Tests/Observatorios.Api.Tests.csproj
          dotnet test backend/Observatorios.Api.Tests/Observatorios.Api.Tests.csproj --no-restore -c Release --verbosity normal
          dotnet build backend/Observatorios.Api/Observatorios.Api.csproj -c Release --no-restore
        env:
          Observatorio__SkipSchemaBootstrap: "true"
          Observatorio__SkipStartupSeeds: "true"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build Angular
        run: |
          npm ci
          npm run build
