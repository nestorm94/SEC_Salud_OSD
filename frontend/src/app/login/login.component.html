<div class="login-page">
  <div class="login-card content-card">
    <div class="login-card__header">
      <img
        class="osd-brand-logo osd-brand-logo--login"
        src="/branding/logo-stacked.png"
        alt="Observatorio de Salud de Casanare"
        width="220"
        height="140"
      />
      <p class="login-card__tagline">Plataforma de carga y análisis de información en salud</p>
    </div>

    @if (error) {
      <div class="alert alert--error">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input id="usuario" type="text" formControlName="usuario" autocomplete="username" />
        @if (form.controls.usuario.touched && form.controls.usuario.invalid) {
          <span class="error">Usuario obligatorio</span>
        }
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" autocomplete="current-password" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <span class="error">Contraseña obligatoria</span>
        }
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading" style="width: 100%; margin-top: 0.5rem">
        {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>
    </form>
  </div>
</div>
