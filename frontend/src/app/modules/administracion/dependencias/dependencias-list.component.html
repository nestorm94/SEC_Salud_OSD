<app-page-header title="Dependencias" subtitle="Entidades y secretarías del observatorio">
  <button type="button" class="btn-primary" (click)="mostrarForm.set(!mostrarForm())">
    {{ mostrarForm() ? 'Cancelar' : 'Nueva dependencia' }}
  </button>
</app-page-header>

@if (mensaje()) {
  <div class="alert alert--success">{{ mensaje() }}</div>
}
@if (error()) {
  <div class="alert alert--error">{{ error() }}</div>
}

@if (mostrarForm()) {
  <div class="filter-card content-card">
    <form [formGroup]="form" (ngSubmit)="crear()" class="form-grid">
      <div class="form-group">
        <label>Código</label>
        <input type="text" formControlName="codigo" />
      </div>
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" formControlName="nombre" />
      </div>
      <div class="form-group" style="align-self: end">
        <button type="submit" class="btn-success">Crear dependencia</button>
      </div>
    </form>
  </div>
}

@if (loading()) {
  <app-loading-state></app-loading-state>
} @else {
  <div class="table-card">
    <div class="responsive-table-wrap">
      <table class="responsive-table data-table">
        <thead>
          <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          @for (d of pag.paginated(); track d.id) {
            <tr>
              <td data-label="Código"><strong>{{ d.codigo }}</strong></td>
              <td data-label="Nombre">{{ d.nombre }}</td>
              <td data-label="Estado">
                <app-status-badge [estado]="d.activo ? 'ACTIVO' : 'INACTIVO'"></app-status-badge>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
    <app-table-paginator
      [page]="pag.page()"
      [totalPages]="pag.totalPages()"
      [totalItems]="pag.totalItems()"
      (pageChange)="pag.setPage($event)"
    />
  </div>
}
