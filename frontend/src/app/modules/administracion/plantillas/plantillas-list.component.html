<app-page-header title="Plantillas" subtitle="Definición de plantillas de carga Excel">
  <button type="button" class="btn-primary" (click)="mostrarForm.set(!mostrarForm())">
    {{ mostrarForm() ? 'Cancelar' : 'Nueva plantilla' }}
  </button>
</app-page-header>

@if (error()) {
  <div class="alert alert--error">{{ error() }}</div>
}

@if (mostrarForm()) {
  <div class="content-card filter-card">
    <h3 class="content-card__title">Registrar plantilla</h3>
    <form [formGroup]="form" (ngSubmit)="crear()">
      <div class="form-grid">
        <div class="form-group">
          <label>Código</label>
          <input type="text" formControlName="codigo" />
        </div>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" formControlName="nombre" />
        </div>
        <div class="form-group">
          <label>Descripción</label>
          <input type="text" formControlName="descripcion" />
        </div>
        <div class="form-group">
          <label>Dependencia</label>
          <select formControlName="dependencia_id">
            <option [value]="''" class="option-placeholder">Seleccione</option>
            @for (d of dependencias(); track d.id) {
              <option [value]="d.id">{{ d.nombre }}</option>
            }
          </select>
        </div>
      </div>
      <label class="checkbox-label" style="margin-top: 0.5rem">
        <input type="checkbox" formControlName="activo" /> Plantilla activa
      </label>
      <button type="submit" class="btn-primary" style="margin-top: 1rem">Crear plantilla</button>
    </form>
  </div>
}

@if (loading()) {
  <app-loading-state></app-loading-state>
} @else {
  <div class="table-card">
    <div class="responsive-table-wrap">
      <table class="responsive-table data-table">
        <thead>
          <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Dependencia</th>
            <th>Campos</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (p of pag.paginated(); track p.id) {
            <tr>
              <td>{{ p.codigo }}</td>
              <td>{{ p.nombre }}</td>
              <td>{{ p.dependencia || '—' }}</td>
              <td>{{ p.total_campos }}</td>
              <td>
                <app-status-badge [estado]="p.activo ? 'ACTIVO' : 'INACTIVO'"></app-status-badge>
              </td>
              <td class="actions" data-label="Acciones">
                <app-table-actions>
                  <app-icon-action
                    icon="format_list_bulleted"
                    label="Gestionar campos de la plantilla"
                    [link]="['/administracion/plantillas', p.id, 'campos']"
                  />
                </app-table-actions>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
    <app-table-paginator
      [page]="pag.page()"
      [totalPages]="pag.totalPages()"
      [totalItems]="pag.totalItems()"
      (pageChange)="pag.setPage($event)"
    />
  </div>
}
