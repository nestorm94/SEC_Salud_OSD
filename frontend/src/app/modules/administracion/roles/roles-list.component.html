<app-page-header title="Roles" subtitle="Roles del sistema"></app-page-header>

@if (error()) {
  <div class="alert alert--error">{{ error() }}</div>
}

@if (loading()) {
  <p class="loading">Cargando...</p>
} @else {
  <div class="card table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Descripción</th>
        </tr>
      </thead>
      <tbody>
        @for (r of roles(); track r.id) {
          <tr>
            <td>{{ r.id }}</td>
            <td>{{ r.nombre }}</td>
            <td>{{ r.descripcion || '—' }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
}
